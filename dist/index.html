<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#f6f8fb" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#070a12" media="(prefers-color-scheme: dark)" />
  <title>Solar AI Assistant</title>

  <!-- No-flash theme boot: resolve the active theme before first paint -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var theme = stored
          || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <!-- Type: Bricolage Grotesque (display) + Onest (UI/body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Onest:wght@300..700&display=swap"
    rel="stylesheet"
  />

  <!-- Critical paint colors to prevent theme flash before CSS loads -->
  <style>
    html[data-theme='light'] { background: #f6f8fb; }
    html[data-theme='dark']  { background: #070a12; }
    body { margin: 0; }
  </style>
  <script type="module" crossorigin src="/assets/index-C0appDl-.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CLRy_3Mf.css">
</head>
<body>

</body>
</html>
